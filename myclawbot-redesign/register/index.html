<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0709" />
  <title>Регистрация — open-clawbot.ru</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/login/style.css?v=6" />
</head>
<body>
  <header class="header"><div class="wrap nav"><a href="/"><img class="brand-logo" src="/assets/logo-bot.png" alt="logo"></a><a class="btn" href="/login/">Уже есть аккаунт?</a></div></header>
  <main class="wrap main">
    <section class="card">
      <h1>Регистрация</h1>
      <p class="muted">Создайте аккаунт для доступа к личному кабинету.</p>
      <div class="field"><label class="label">Имя</label><div class="input-wrap"><input id="name" class="input" type="text" placeholder="Ваше имя"></div></div>
      <div class="field"><label class="label">Email</label><div class="input-wrap"><input id="email" class="input" type="email" placeholder="you@example.com"></div></div>
      <div class="field"><label class="label">Пароль</label><div class="input-wrap"><input id="pwd" class="input" type="password" placeholder="не менее 6 символов"></div></div>
      <div class="field"><label class="label">Подтвердите пароль</label><div class="input-wrap"><input id="pwd2" class="input" type="password" placeholder="не менее 6 символов"></div></div>
      <button class="login-btn" id="regBtn" type="button">Создать аккаунт</button>
      <p class="muted" id="hint" style="margin-top:10px"></p>
    </section>
  </main>
  <script>
    document.getElementById('regBtn').onclick = async () => {
      const password = document.getElementById('pwd').value;
      const password2 = document.getElementById('pwd2').value;
      if (password !== password2) {
        document.getElementById('hint').textContent = 'Ошибка: пароли не совпадают';
        return;
      }
      const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password
      };
      const r = await fetch('/api/auth/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      const j = await r.json();
      if (!r.ok) return document.getElementById('hint').textContent = 'Ошибка: ' + (j.error || 'register_failed');
      location.href = '/account/';
    };
  </script>
</body>
</html>
