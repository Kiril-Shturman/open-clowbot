<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0709" />
  <title>Вход — open-clawbot.ru</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header class="header">
    <div class="wrap nav">
      <a href="/"><img class="brand-logo" src="/assets/logo-bot.png" alt="logo"></a>
      <a class="btn" href="/">На главную</a>
    </div>
  </header>

  <main class="wrap main">
    <section class="card">
      <h1>Вход в аккаунт</h1>
      <p class="muted">Добро пожаловать обратно в защищенную зону</p>

      <div class="field">
        <label class="label">Email</label>
        <div class="input-wrap">
          <span class="icon" aria-hidden="true">👤</span>
          <input id="email" class="input" type="email" placeholder="you@example.com">
        </div>
      </div>

      <div class="field">
        <label class="label">Пароль</label>
        <div class="input-wrap">
          <span class="icon" aria-hidden="true">🔒</span>
          <input id="pwd" class="input" type="password" placeholder="••••••••">
          <button class="eye" id="togglePwd" type="button" aria-label="Показать пароль">👁️</button>
        </div>
      </div>

      <button class="login-btn" type="button" id="emailLoginBtn">Войти</button>

      <div class="divider">ИЛИ ВОЙТИ ЧЕРЕЗ</div>
      <div id="googleBtnWrap">
        <button class="google-btn" type="button">Google</button>
      </div>

      <p class="bottom">Нет аккаунта? <a href="/register/">Зарегистрироваться</a></p>
      <p class="muted" id="loginHint" style="margin-top:8px"></p>
    </section>
  </main>

  <script>
    const CLIENT_ID = '884284199336-h238f68r3kthrj59adokma1f9612ud0o.apps.googleusercontent.com';

    document.getElementById('emailLoginBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pwd').value;
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const j = await r.json();
      if (!r.ok) {
        document.getElementById('loginHint').textContent = 'Ошибка входа: ' + (j.error || 'login_failed');
        return;
      }
      location.href = '/account/';
    };

    document.getElementById('togglePwd').onclick = () => {
      const p = document.getElementById('pwd');
      p.type = p.type === 'password' ? 'text' : 'password';
    };

    function handleCredentialResponse(response) {
      fetch('/api/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      })
      .then(r => r.json().then(j => ({ok:r.ok, j})))
      .then(({ok, j}) => {
        if (!ok) throw new Error(j.error || 'login_failed');
        location.href = '/account/';
      })
      .catch(err => {
        document.getElementById('loginHint').textContent = 'Ошибка входа: ' + err.message;
      });
    }

    window.addEventListener('load', () => {
      if (!window.google || !CLIENT_ID) return;
      google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
      const wrap = document.getElementById('googleBtnWrap');
      wrap.innerHTML = '<div id="googleRealBtn"></div>';
      google.accounts.id.renderButton(document.getElementById('googleRealBtn'), { theme: 'outline', size: 'large', width: 420 });
    });
  </script>
</body>
</html>
